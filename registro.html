<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Nuevo Usuario - NutriControl</title>
    <link rel="shortcut icon" href="/nutricion.png" type="image/x-icon">
</head>
<body>
<nav class="sidebar">
    <button class="menu-toggle no-print" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="logo-container" id="logoContainer">
        <img src="logo.jpeg" alt="Logo" class="logo-redondo">
        <h2>NutriControl</h2>
    </div>
    
    <div class="nav-menu" id="navMenu">
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> <span>Inicio</span></a>
        <a href="registro.html" class="nav-link"><i class="fas fa-user-plus"></i> <span>Nuevo Usuario</span></a>
        <a href="ficha.html" class="nav-link"><i class="fas fa-address-book"></i> <span>Ver Fichas</span></a>
        <a href="estadistica.html" class="nav-link"><i class="fas fa-chart-line"></i> <span>Estadística</span></a>
        
        <button class="nav-link" onclick="cerrarSesion()" style="width: 100%; margin-top: auto; border: none; background: #c0392b; cursor: pointer;">
            <i class="fas fa-power-off"></i> <span>Cerrar Sesión</span>
        </button>
    </div>
</nav>

        <script>
            function cerrarSesion() { window.location.href = 'index.html'; }
        </script>
    <main class="main-content">
        <h1>Registro de Personal</h1>
        <form id="registroForm">
            <div class="card">
                <h3>Datos Personales</h3>
                <div class="grid-3">
                    <div class="form-group"><label>Jerarquía</label><input type="text" id="jerarquia" required></div>
                    <div class="form-group"><label>Nombre y Apellido</label><input type="text" id="nombre" required></div>
                    <div class="form-group"><label>DNI</label><input type="text" id="dni" required></div>
                    <div class="form-group"><label>CE</label><input type="text" id="ce" required></div>
                    <div class="form-group"><label>F. Nacimiento</label><input type="date" id="fechaNac" required></div>
                    <div class="form-group"><label>Teléfono</label><input type="tel" id="telefono" required></div>
                </div>
            </div>
            <div class="card">
                <h3>Composición Corporal</h3>
                <div class="grid-3">
                    <div class="form-group"><label>Peso (kg)</label><input type="number" step="0.1" id="peso" required></div>
                    <div class="form-group"><label>Talla (m)</label><input type="number" step="0.01" id="talla" required></div>
                    <div class="form-group"><label>% Músculo</label><input type="number" step="0.1" id="musculo" required></div>
                    <div class="form-group"><label>% Grasa</label><input type="number" step="0.1" id="grasa" required></div>
                    <div class="form-group"><label>kg Masa Osea</label><input type="number" step="0.1" id="osea" required></div>
                    <div class="form-group"><label>% Agua Corporal</label><input type="number" step="0.1" id="agua" required></div>
                </div>
                <!-- <h4>IMC Calculado: <span id="valIMC">0.00</span></h4> -->
                <div class="form-group"><label>Novedades</label><textarea id="novedades"></textarea></div>
            </div>
            <button type="submit" class="btn-accion" style="background:var(--secondary)">Guardar Registro</button>
        </form>
    </main>
    <script type="module" src="script.js"></script>

</body>
</html>
